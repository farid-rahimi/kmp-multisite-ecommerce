name: CI

on:
  pull_request:
  push:
    branches: [main, master, develop, migrate-to-share-ui]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Compile Android flavors + shared-ui Android + shared-ui iOS
        run: |
          ./gradlew \
            :app:compileSiteADebugKotlin \
            :app:compileSiteBDebugKotlin \
            :shared-ui:compileAndroidMain \
            :shared-ui:compileKotlinIosSimulatorArm64 \
            --no-daemon --stacktrace

